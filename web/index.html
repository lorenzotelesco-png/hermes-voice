<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Hermes">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:ital,opsz,wght@0,9..40,200;0,9..40,300;0,9..40,400&display=swap" rel="stylesheet">
  <title>Hermes</title>
  <style>
    :root {
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-ui: 'DM Sans', system-ui, sans-serif;
      --white: #ffffff;
      --off-white: rgba(255,255,255,.9);
      --subtle: rgba(255,255,255,.22);
      --dim: rgba(255,255,255,.12);
      --glow-idle:      0 0 0px transparent;
      --glow-listen:    0 0 56px rgba(180,200,255,.18), 0 0 110px rgba(180,200,255,.08);
      --glow-speak:     0 0 64px rgba(255,248,230,.22), 0 0 130px rgba(255,240,200,.10);
      --glow-think:     0 0 40px rgba(200,200,255,.14);
      --bg-idle:        #000;
      --bg-listen:      #000;
      --bg-speak:       #000;
      --bg-think:       #000;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #000;
      color: var(--white);
      font-family: var(--font-ui);
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── GRAIN OVERLAY ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: .028;
      pointer-events: none;
      z-index: 9998;
    }

    /* ── START SCREEN ── */
    #start-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #000;
      z-index: 20; cursor: pointer; user-select: none;
    }

    #start-screen h1 {
      font-family: var(--font-display);
      font-size: 3rem;
      font-weight: 300;
      letter-spacing: .52em;
      color: var(--white);
      margin-bottom: 14px;
      margin-right: -.52em; /* optical centering with wide tracking */
      animation: title-breathe 5s ease-in-out infinite;
    }

    @keyframes title-breathe {
      0%, 100% { opacity: .92; }
      50%       { opacity: 1; }
    }

    #start-screen p {
      font-family: var(--font-ui);
      font-size: .66rem;
      font-weight: 300;
      color: rgba(255,255,255,.28);
      letter-spacing: .3em;
      text-transform: uppercase;
    }

    /* thin horizontal rule between title and subtitle */
    #start-screen .rule {
      width: 1px;
      height: 28px;
      background: linear-gradient(to bottom, transparent, rgba(255,255,255,.18), transparent);
      margin: 16px 0;
    }

    #start-hint {
      position: absolute; bottom: 52px;
      font-family: var(--font-ui);
      font-size: .62rem;
      font-weight: 300;
      color: rgba(255,255,255,.16);
      letter-spacing: .22em;
      text-transform: uppercase;
      animation: fade-hint 3.5s ease-in-out infinite;
    }

    @keyframes fade-hint {
      0%, 100% { opacity: 0; }
      45%, 55%  { opacity: 1; }
    }

    #btn-start { display: none; }

    /* ── MAIN SCREEN ── */
    #main-screen {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg-idle);
      transition: background 1.2s ease;
      animation: screen-in .7s cubic-bezier(.22,.8,.36,1) both;
    }

    @keyframes screen-in {
      from { opacity: 0; transform: scale(.97); }
      to   { opacity: 1; transform: scale(1); }
    }

    body.idle      #main-screen { background: var(--bg-idle);   }
    body.listening #main-screen { background: var(--bg-listen); }
    body.speaking  #main-screen { background: var(--bg-speak);  }
    body.thinking  #main-screen { background: var(--bg-think);  }

    /* ── BLOBS ── */
    #blobs {
      display: flex; align-items: center; justify-content: center;
      gap: 16px; margin-bottom: 48px;
      position: relative;
    }


    .blob {
      width: 64px; height: 76px;
      border-radius: 50%;
      background: var(--white);
      will-change: transform, opacity, box-shadow;
      transition: background .6s ease, box-shadow .8s ease;
    }

    body.listening .blob { background: #C6D8F8; box-shadow: var(--glow-listen); }
    body.speaking  .blob { background: #F8EDD4; box-shadow: var(--glow-speak);  }
    body.thinking  .blob { background: #C9C6F2; box-shadow: var(--glow-think);  }

    /* ── LABEL ── */
    #label {
      font-family: var(--font-ui);
      font-size: .7rem;
      font-weight: 300;
      letter-spacing: .18em;
      color: rgba(255,255,255,.32);
      text-transform: uppercase;
      height: 20px;
      margin-bottom: 64px;
      transition: color .6s ease;
    }

    body.speaking #label { color: rgba(255,248,230,.45); }
    body.listening #label { color: rgba(210,225,255,.42); }

    /* ── INTERRUPT HINT ── */
    #hint {
      position: absolute; top: 62%; left: 50%; transform: translateX(-50%);
      font-family: var(--font-ui);
      font-size: .7rem;
      font-weight: 300;
      color: rgba(255,255,255,.22);
      letter-spacing: .08em;
      opacity: 0; transition: opacity .5s ease;
      pointer-events: none; white-space: nowrap;
    }

    body.speaking #hint { opacity: 1; }

    /* ── CONTROLS ── */
    #controls {
      position: absolute; bottom: 48px;
      display: flex; align-items: center; justify-content: center; gap: 20px;
    }

    .ctrl {
      width: 54px; height: 54px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.1);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform .18s cubic-bezier(.34,1.56,.64,1),
                  opacity .2s ease,
                  border-color .3s ease,
                  background .3s ease;
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
    }

    .ctrl:active { transform: scale(.88); }

    #btn-mute {
      background: rgba(255,255,255,.07);
    }
    #btn-mute:hover {
      background: rgba(255,255,255,.12);
      border-color: rgba(255,255,255,.2);
    }
    #btn-mute svg {
      width: 19px; height: 19px;
      fill: none; stroke: rgba(255,255,255,.75);
      stroke-width: 1.6; stroke-linecap: round;
      transition: stroke .3s ease;
    }
    #btn-mute[style*="0.35"] svg { stroke: rgba(255,255,255,.35); }

    #btn-end {
      background: rgba(180,40,35,.75);
      border-color: rgba(255,80,70,.2);
      width: 58px; height: 58px;
    }
    #btn-end:hover {
      background: rgba(200,50,45,.85);
      border-color: rgba(255,80,70,.35);
    }
    #btn-end svg {
      width: 16px; height: 16px; fill: rgba(255,255,255,.9);
    }

    /* ── ERROR TOAST ── */
    #error {
      position: fixed; top: 20px; left: 16px; right: 16px;
      background: rgba(160,25,25,.88);
      -webkit-backdrop-filter: blur(16px);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,80,70,.2);
      color: rgba(255,200,200,.9);
      padding: 12px 18px;
      border-radius: 14px;
      font-family: var(--font-ui);
      font-size: .76rem;
      font-weight: 300;
      text-align: center;
      display: none;
      z-index: 9999;
      animation: toast-in .3s cubic-bezier(.34,1.56,.64,1);
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(-8px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>

<div id="error"></div>

<!-- START -->
<div id="start-screen" onclick="startSession()">
  <h1>HERMES</h1>
  <div class="rule"></div>
  <p>assistente vocale</p>
  <button id="btn-start" style="display:none"></button>
  <span id="start-hint">tocca per iniziare</span>
</div>

<!-- MAIN -->
<div id="main-screen">
  <div id="blobs">
    <div class="blob" id="b0"></div>
    <div class="blob" id="b1"></div>
    <div class="blob" id="b2"></div>
    <div class="blob" id="b3"></div>
  </div>
  <div id="label">in attesa</div>
  <div id="hint">tocca per interrompere</div>
  <div id="controls">
    <button class="ctrl" id="btn-mute" onclick="toggleMute()" title="Muto">
      <svg viewBox="0 0 24 24" id="mic-icon"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
    </button>
    <button class="ctrl" id="btn-end" onclick="stopSession()" title="Termina">
      <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
    </button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
