<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Hermes</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }

    /* ── START SCREEN ── */
    #start-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #000; z-index: 20; cursor: pointer; user-select: none;
    }
    #start-screen h1 {
      font-size: 2.2rem; font-weight: 200; letter-spacing: .32em;
      color: #fff; margin-bottom: 10px;
    }
    #start-screen p {
      font-size: .72rem; color: rgba(255,255,255,.22);
      letter-spacing: .22em; text-transform: uppercase;
    }
    #start-hint {
      position: absolute; bottom: 52px;
      font-size: .7rem; color: rgba(255,255,255,.18);
      letter-spacing: .16em; text-transform: uppercase;
      animation: fade-hint 3s ease-in-out infinite;
    }
    @keyframes fade-hint {
      0%, 100% { opacity: 0; } 50% { opacity: 1; }
    }
    #btn-start { display: none; }

    /* ── MAIN SCREEN ── */
    #main-screen {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000;
    }

    /* BLOBS */
    #blobs {
      display: flex; align-items: center; justify-content: center;
      gap: 14px; margin-bottom: 52px;
    }
    .blob {
      width: 68px; height: 78px;
      border-radius: 50%;
      background: #fff;
      will-change: transform, opacity;
      transition: background .4s;
    }

    /* LABEL */
    #label {
      font-size: .82rem; font-weight: 400;
      letter-spacing: .1em; color: rgba(255,255,255,.38);
      text-transform: uppercase; height: 20px;
      margin-bottom: 64px;
    }

    /* INTERRUPT hint */
    #hint {
      position: absolute; top: 62%; left: 50%; transform: translateX(-50%);
      font-size: .82rem; color: rgba(255,255,255,.28); letter-spacing: .05em;
      opacity: 0; transition: opacity .4s; pointer-events: none;
    }
    body.speaking #hint { opacity: 1; }

    /* BOTTOM CONTROLS */
    #controls {
      position: absolute; bottom: 52px;
      display: flex; align-items: center; justify-content: center; gap: 28px;
    }
    .ctrl {
      width: 52px; height: 52px; border-radius: 50%; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: transform .15s, opacity .2s;
    }
    .ctrl:active { transform: scale(.92); }
    #btn-mute { background: rgba(255,255,255,.1); }
    #btn-mute svg { width: 20px; height: 20px; fill: none; stroke: #fff; stroke-width: 1.8; stroke-linecap: round; }
    #btn-end  { background: #c0392b; }
    #btn-end  svg { width: 18px; height: 18px; fill: #fff; }

    /* ERROR TOAST */
    #error {
      position: fixed; top: 20px; left: 16px; right: 16px;
      background: rgba(180,30,30,.9); backdrop-filter: blur(8px);
      color: #fca5a5; padding: 11px 16px; border-radius: 12px;
      font-size: .82rem; text-align: center; display: none; z-index: 99;
    }
  </style>
</head>
<body>

<div id="error"></div>

<!-- START -->
<div id="start-screen" onclick="startSession()">
  <h1>HERMES</h1>
  <p>assistente vocale</p>
  <button id="btn-start" style="display:none"></button>
  <span id="start-hint">tocca per iniziare</span>
</div>

<!-- MAIN -->
<div id="main-screen">
  <div id="blobs">
    <div class="blob" id="b0"></div>
    <div class="blob" id="b1"></div>
    <div class="blob" id="b2"></div>
    <div class="blob" id="b3"></div>
  </div>
  <div id="label">in attesa</div>
  <div id="hint">tocca per interrompere</div>
  <div id="controls">
    <button class="ctrl" id="btn-mute" onclick="toggleMute()" title="Muto">
      <svg viewBox="0 0 24 24" id="mic-icon"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
    </button>
    <button class="ctrl" id="btn-end" onclick="stopSession()" title="Termina">
      <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
    </button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
